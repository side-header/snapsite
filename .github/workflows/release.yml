name: Release

on:
  push:
    tags:
      - "*"

permissions:
  contents: write

jobs:
  windows:
    name: Build Windows x64
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Publish
        shell: pwsh
        run: .\scripts\publish-windows-x64.ps1

      - name: Stage asset
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release-assets | Out-Null
          Copy-Item build/windows-x64/SiteSnap.exe release-assets/SiteSnap-windows-x64.exe

      - name: Upload asset
        uses: actions/upload-artifact@v4
        with:
          name: windows-x64
          path: release-assets/SiteSnap-windows-x64.exe
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - windows

    steps:
      - name: Download assets
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-assets/SiteSnap-windows-x64.exe
