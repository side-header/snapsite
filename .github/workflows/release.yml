name: Release

on:
  push:
    tags:
      - "*"

permissions:
  contents: write

jobs:
  windows:
    name: Build Windows x64
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Publish
        shell: pwsh
        run: .\scripts\publish-windows-x64.ps1

      - name: Stage asset
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release-assets | Out-Null
          Copy-Item build/windows-x64/SiteSnap.exe release-assets/SiteSnap-windows-x64.exe

      - name: Upload asset
        uses: actions/upload-artifact@v4
        with:
          name: windows-x64
          path: release-assets/SiteSnap-windows-x64.exe
          if-no-files-found: error

  macos:
    name: Build macOS arm64
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Publish
        run: ./scripts/publish-macos-arm64.sh

      - name: Stage asset
        run: |
          mkdir -p release-assets
          cd build
          ditto -c -k --sequesterRsrc --keepParent macos-arm64 ../release-assets/SiteSnap-macos-arm64.zip

      - name: Upload asset
        uses: actions/upload-artifact@v4
        with:
          name: macos-arm64
          path: release-assets/SiteSnap-macos-arm64.zip
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - windows
      - macos

    steps:
      - name: Download assets
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-assets/SiteSnap-windows-x64.exe
            release-assets/SiteSnap-macos-arm64.zip
